<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bro codes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 id="myH1">stopwatch</h1>

    <div class="container">
       <div id="display">
          <p id="clock">00:00:00:00</p>
       </div>
       <div id="controls">
        <button class="myBtn" id="startBtn" onclick="start()">Start</button>
        <button class="myBtn" id="stopBtn" onclick="stop()">Stop</button>
        <button class="myBtn" id="resetBtn" onclick="reset()">Reset</button>

       </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
